name: Build Android AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: NotificationThrottle
        run: chmod +x gradlew

      - name: Generate Gradle wrapper (if missing)
        working-directory: NotificationThrottle
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Gradle wrapper jar missing, generating..."
            gradle wrapper --gradle-version 8.4
          else
            echo "Gradle wrapper already present"
          fi

      - name: Build Release AAB
        working-directory: NotificationThrottle
        run: ./gradlew bundleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Locate AAB file
        id: find_aab
        run: |
          AAB_PATH=$(find NotificationThrottle -name "*.aab" | head -1)
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "Found AAB at: $AAB_PATH"

      - name: Sign AAB (optional - only runs if keystore secret is set)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: NotificationThrottle
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/bundle/release/app-release-signed.aab \
            "${{ steps.find_aab.outputs.aab_path }}"
          rm -f keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-throttle-release-aab
          path: ${{ steps.find_aab.outputs.aab_path }}
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            NotificationThrottle/app/build/reports/
            NotificationThrottle/app/build/outputs/logs/
          retention-days: 7
          
